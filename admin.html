<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Admin • Herní Kavárna Praha 4</title>
  <link id="favicon" rel="icon" type="image/svg+xml">
  <link rel="stylesheet" href="style.css"/>
</head>

<body data-page="admin">
  <div class="bg"></div>

  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">🛠️</div>
        <div class="brand-name">Admin</div>
        <div class="pill">Rezervace + objednávky</div>
      </div>

      <div class="nav-actions">
        <a class="navbtn" href="index.html" data-i18n="home">Home</a>
        <a class="navbtn" href="menu.html" data-i18n="menu">Menu</a>
        <a class="navbtn" href="booking.html" data-i18n="booking">Rezervace</a>
        <a class="navbtn" href="admin.html" data-i18n="admin">Admin</a>

        <span class="pill" data-cart-badge>Košík: 0</span>

        <select id="langSelect" class="select">
          <option value="cs">CZ</option>
          <option value="en">EN</option>
          <option value="uk">UA</option>
          <option value="vi">VI</option>
        </select>

        <button id="themeToggle" class="navbtn ghost" type="button">🌙</button>
      </div>
    </div>

    <h1 class="h1">Admin</h1>
    <p class="p">Tady uvidíš rezervace a objednávky jídla.</p>

    <div class="card">
      <div class="row between">
        <h2 class="section-subtitle" style="margin:0;">📋 Seznam rezervací</h2>
        <button class="btn secondary" id="wipeBookingsBtn" type="button">Smazat vše</button>
      </div>

      <div class="divider"></div>

      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Zákazník</th>
              <th>Zóna</th>
              <th>Čas</th>
              <th>Balíček</th>
              <th>Jídlo</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="adminBody"></tbody>
        </table>
      </div>

      <div id="toast" class="toast"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
