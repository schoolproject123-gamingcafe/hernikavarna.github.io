<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Menu • Herní Kavárna Praha 4</title>
  <link id="favicon" rel="icon" type="image/svg+xml">
  <link rel="stylesheet" href="style.css"/>
</head>

<body data-page="menu">
  <div class="bg"></div>

  <div class="container">
    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">🍜</div>
        <div class="brand-name">Menu</div>
        <div class="pill">Objednávka půjde do rezervace</div>
      </div>

      <div class="nav-actions">
        <a class="navbtn" href="index.html" data-i18n="home">Home</a>
        <a class="navbtn" href="menu.html" data-i18n="menu">Menu</a>
        <a class="navbtn" href="booking.html" data-i18n="booking">Rezervace</a>
        <a class="navbtn" href="admin.html" data-i18n="admin">Admin</a>

        <span class="pill" data-cart-badge>Košík: 0</span>

        <select id="langSelect" class="select">
          <option value="cs">CZ</option>
          <option value="en">EN</option>
          <option value="uk">UA</option>
          <option value="vi">VI</option>
        </select>

        <button id="themeToggle" class="navbtn ghost" type="button">🌙</button>
      </div>
    </div>

    <h1 class="h1">Menu</h1>
    <p class="p">Vyber jídlo, přidej do košíku a potom udělej rezervaci (přineseme do zóny).</p>

    <div class="grid cols-2">
      <div class="card">
        <h2 class="section-subtitle">🍱 Položky</h2>
        <div class="divider"></div>
        <div id="menuList"></div>
      </div>

      <div class="card">
        <h2 class="section-subtitle">🧾 Košík</h2>

        <div class="row">
          <a class="btn" href="booking.html" data-i18n="goBooking">Přejít na rezervaci</a>
          <button class="btn secondary" id="clearCartBtn" type="button" data-i18n="clearCart">Vyčistit košík</button>
        </div>

        <div class="divider"></div>

        <div id="cartList"></div>

        <div class="divider"></div>

        <div class="row between">
          <div class="price" data-i18n="total">Celkem:</div>
          <div class="price" id="cartTotal">0 Kč</div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
