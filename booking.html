<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Rezervace • Herní Kavárna Praha 4</title>
  <link id="favicon" rel="icon" type="image/svg+xml">
  <link rel="stylesheet" href="style.css"/>
</head>

<body data-page="booking">
  <div class="bg"></div>
  <div class="container">

    <div class="topbar">
      <div class="brand">
        <div class="brand-icon">🗓️</div>
        <div class="brand-name" data-i18n="booking">Rezervace</div>
        <div class="pill">PC/PS/VR + jídlo do zóny</div>
      </div>

      <div class="nav-actions">
        <a class="navbtn" href="index.html" data-i18n="home">Home</a>
        <a class="navbtn" href="menu.html" data-i18n="menu">Menu</a>
        <a class="navbtn" href="booking.html" data-i18n="booking">Rezervace</a>
        <a class="navbtn" href="admin.html" data-i18n="admin">Admin</a>

        <span class="pill" data-cart-badge>Košík: 0</span>

        <select id="langSelect" class="select">
          <option value="cs">CZ</option>
          <option value="en">EN</option>
          <option value="uk">UA</option>
          <option value="vi">VI</option>
        </select>

        <button id="themeToggle" class="navbtn ghost" type="button">🌙</button>
      </div>
    </div>

    <h1 class="h1" data-i18n="booking">Rezervace</h1>
    <p class="p">Vyber zónu a čas. Jídlo z košíku připravíme a přineseme přímo do tvé zóny.</p>

    <div class="grid cols-2">

      <!-- LEFT: FORM -->
      <div class="card">
        <h2 style="margin:0 0 8px">👤 Kontakt</h2>

        <label class="small">Jméno</label>
        <input class="input" id="nameInput" placeholder="např. Milan">

        <label class="small">Email</label>
        <input class="input" id="emailInput" placeholder="např. milan@email.cz">

        <label class="small">Telefon (volitelné)</label>
        <input class="input" id="phoneInput" placeholder="+420 ...">

        <div class="hr"></div>

        <h2 style="margin:0 0 8px">🎮 Zóna</h2>

        <label class="small">Typ zóny</label>
        <select class="input" id="zoneType"></select>

        <label class="small">Číslo</label>
        <select class="input" id="zoneNumber"></select>

        <div class="hr"></div>

        <label class="small">Datum</label>
        <input class="input" id="dateInput" type="date">

        <label class="small">Čas</label>
        <input class="input" id="timeInput" type="time">

        <div class="hr"></div>

        <h2 style="margin:0 0 8px">💎 Balíček (dealy)</h2>
        <select class="input" id="dealSelect"></select>
        <div class="small">Bez balíčku = default 60 minut.</div>

        <div class="hr"></div>

        <label class="small">Poznámka (jídlo do zóny)</label>
        <input class="input" id="notesInput" value="Jídlo připravíme a přineseme přímo do zóny.">

        <div class="hr"></div>

        <button class="btn" id="submitBookingBtn" type="button">Vytvořit rezervaci</button>
        <div id="toast" class="toast"></div>
      </div>

      <!-- RIGHT: CART -->
      <div class="card">
        <h2 style="margin:0 0 8px">🧾 Košík (půjde do rezervace)</h2>

        <div class="row">
          <a class="btn secondary" href="menu.html">Přidat jídlo</a>
          <button class="btn secondary" id="clearCartBtn" type="button">Vyčistit košík</button>
        </div>

        <div class="hr"></div>

        <div id="cartList"></div>

        <div class="hr"></div>

        <div class="row" style="justify-content:space-between">
          <div class="price">Jídlo celkem:</div>
          <div class="price" id="cartTotal">0 Kč</div>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
